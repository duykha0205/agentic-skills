name = "drawio-mcp-app"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node src/build-html.js"

[[durable_objects.bindings]]
name = "MCP_SESSION_MANAGER"
class_name = "MCPSessionManager"

# Migrations required for Durable Objects
[[migrations]]
tag = "v1"
new_classes = ["MCPSessionManager"]
